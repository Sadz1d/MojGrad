<div class="survey-create-wrapper">

  <div class="survey-card">
    <h2 class="title">Nova anketa</h2>
    <p class="subtitle">
      Kreirajte anketu koja će biti dostupna građanima u odabranom periodu.
    </p>

    <form class="survey-form">

      <!-- PITANJE -->
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Pitanje ankete</mat-label>
        <input
          matInput
          placeholder="Unesite pitanje ankete"
          [(ngModel)]="model.question"
          (ngModelChange)="onFieldChange()"
          name="question"
          required
        />
      </mat-form-field>

      <!-- DATUMI -->
      <div class="date-row">
        <mat-form-field appearance="outline">
          <mat-label>Datum početka</mat-label>
          <input
            matInput
            type="date"
            [(ngModel)]="model.startDate"
            (ngModelChange)="onFieldChange()"
            name="startDate"
          />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Datum završetka</mat-label>
          <input
            matInput
            type="date"
            [(ngModel)]="model.endDate"
            (ngModelChange)="onFieldChange()"
            name="endDate"
          />
        </mat-form-field>
      </div>

      <!-- ACTIONS -->
      <div class="actions">
        <button
          mat-stroked-button
          color="primary"
          routerLink="/admin"
        >
          Odustani
        </button>


        <!-- AUTOSAVE STATUS -->
        <div class="autosave-bar" *ngIf="autosaveStatus !== 'idle'">
  <span [class.saving]="autosaveStatus === 'saving'"
        [class.saved]="autosaveStatus === 'saved'"
        [class.error]="autosaveStatus === 'error'">
    {{ autosaveLabel }}
  </span>
          <button type="button" class="clear-btn" *ngIf="autosaveStatus === 'saved'" (click)="clearAutosave()">
            ✕ Obriši nacrt
          </button>
        </div>


        <button
          mat-raised-button
          color="primary"
          (click)="save()"
          [disabled]="saving || !model.question"
        >
          {{ saving ? 'Sačuvavam...' : 'Sačuvaj anketu' }}
        </button>
      </div>

    </form>
  </div>

</div>
